# Nginx configuration for IT Helpdesk Project
# Symlink this file to /etc/nginx/sites-available/helpdesk and enable it.

upstream helpdesk_server {
    server unix:/run/gunicorn.sock fail_timeout=0;
}

# Redirect HTTP (Port 80) to HTTPS (Port 443)
server {
    listen 80;
    listen [::]:80;
    server_name helpdesk.example.com; # Replace with your actual domain or IP address

    # ACME-challenge (Let's Encrypt validation) path
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name helpdesk.example.com; # Replace with your actual domain or IP address

    # SSL Certificate Paths (Let's Encrypt certificates generated by certbot)
    ssl_certificate /etc/letsencrypt/live/helpdesk.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/helpdesk.example.com/privkey.pem;

    # SSL Hardening Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # SSL Session cache
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security Headers (Nginx side hardening)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Client body size limits (e.g. for ticket attachment uploads)
    client_max_body_size 15M;

    # Django Static Files
    location /static/ {
        alias /var/www/helpdesk/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Django Media Files (User Uploads)
    location /media/ {
        alias /var/www/helpdesk/media/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        # Secure media files - prevent execution of scripts uploaded by users
        location ~* \.(php|pl|py|jsp|sh|cgi)$ {
            deny all;
        }
    }

    # Proxy request to Gunicorn
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        # Prevent Nginx from buffering the response (good for file transfers and low latency)
        proxy_redirect off;
        proxy_buffering off;
        
        # Route to Gunicorn unix socket upstream
        proxy_pass http://helpdesk_server;
    }

    # Custom Error Pages
    error_page 500 502 503 504 /500.html;
    location = /500.html {
        root /var/www/helpdesk/staticfiles/;
    }
}
